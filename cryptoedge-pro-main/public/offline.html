<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CryptoEdge Pro — Offline</title>
<style>
  body{margin:0;background:#0d1117;color:#e6edf3;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
  .icon{font-size:60px}
  h1{font-size:24px;font-weight:700;margin:0}
  p{font-size:14px;color:#7d8590;text-align:center;max-width:300px;margin:0}
  button{padding:12px 28px;background:#F0B90B;border:none;border-radius:8px;font-size:15px;font-weight:700;color:#000;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Sem Conexão</h1>
  <p>Você está offline. Verifique sua conexão com a internet e tente novamente.</p>
  <button onclick="window.location.reload()">Tentar novamente</button>
</body>
</html>
