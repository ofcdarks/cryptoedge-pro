<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Redefinir Senha — CryptoEdge Pro</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1117;color:#e6edf3;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#161b22;border:1px solid rgba(240,185,11,0.2);border-radius:16px;padding:36px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,0.5)}
  .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px}
  .logo-icon{width:48px;height:48px;background:#F0B90B;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#000}
  .logo-text{font-size:22px;font-weight:800} .logo-text span{color:#F0B90B}
  h2{font-size:18px;font-weight:700;margin-bottom:6px;text-align:center}
  .sub{font-size:13px;color:#7d8590;text-align:center;margin-bottom:24px}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:11px;font-weight:600;color:#7d8590;text-transform:uppercase;letter-spacing:1px}
  .field input{background:#0d1117;border:1.5px solid #30363d;border-radius:8px;padding:12px 14px;font-size:14px;color:#e6edf3;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
  .field input:focus{border-color:#F0B90B;box-shadow:0 0 0 3px rgba(240,185,11,0.1)}
  .field .pw-wrap{position:relative}
  .field .pw-wrap input{width:100%;padding-right:44px}
  .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#7d8590;font-size:15px}
  .strength{height:3px;background:#21262d;border-radius:2px;margin-top:6px;overflow:hidden}
  .strength-bar{height:100%;width:0%;transition:all 0.3s;border-radius:2px}
  .strength-label{font-size:10px;color:#7d8590;margin-top:3px}
  .btn{width:100%;padding:13px;background:linear-gradient(135deg,#F0B90B,#ff9d00);border:none;border-radius:8px;font-size:15px;font-weight:700;color:#000;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(240,185,11,0.35)}
  .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
  .alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
  .alert.error{background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.4);color:#f85149}
  .alert.success{background:rgba(63,185,80,0.1);border:1px solid rgba(63,185,80,0.3);color:#3fb950}
  .back{text-align:center;margin-top:16px;font-size:13px;color:#7d8590}
  .back a{color:#F0B90B;text-decoration:none;font-weight:600}
  .token-expired{text-align:center;padding:20px 0}
  .token-expired .icon{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">C</div>
    <div class="logo-text">CryptoEdge <span>Pro</span></div>
  </div>

  <div id="form-section">
    <h2>🔑 Nova Senha</h2>
    <p class="sub">Digite sua nova senha abaixo</p>

    <div id="msg" class="alert"></div>

    <div class="field">
      <label>Nova Senha</label>
      <div class="pw-wrap">
        <input type="password" id="new-pass" placeholder="Mínimo 6 caracteres" oninput="checkStr(this.value)">
        <button class="pw-toggle" type="button" onclick="togglePw('new-pass',this)">👁</button>
      </div>
      <div class="strength"><div class="strength-bar" id="str-bar"></div></div>
      <div class="strength-label" id="str-label"></div>
    </div>

    <div class="field">
      <label>Confirmar Senha</label>
      <div class="pw-wrap">
        <input type="password" id="confirm-pass" placeholder="Repita a nova senha" onkeydown="if(event.key==='Enter')doReset()">
        <button class="pw-toggle" type="button" onclick="togglePw('confirm-pass',this)">👁</button>
      </div>
    </div>

    <button class="btn" id="reset-btn" onclick="doReset()">
      <span id="btn-txt">Salvar nova senha</span>
      <span>🔐</span>
    </button>
  </div>

  <div id="success-section" style="display:none;text-align:center;padding:20px 0">
    <div style="font-size:48px;margin-bottom:12px">✅</div>
    <h2 style="margin-bottom:8px">Senha redefinida!</h2>
    <p style="color:#7d8590;font-size:14px;margin-bottom:20px">Sua senha foi alterada com sucesso.</p>
    <a href="/" style="display:inline-block;padding:12px 28px;background:#F0B90B;color:#000;font-size:14px;font-weight:700;border-radius:8px;text-decoration:none">Ir para o Login →</a>
  </div>

  <div id="expired-section" style="display:none" class="token-expired">
    <div class="icon">⏰</div>
    <h2 style="margin-bottom:8px">Link expirado</h2>
    <p style="color:#7d8590;font-size:14px;margin-bottom:20px">Este link de redefinição expirou ou já foi utilizado.</p>
    <a href="/" style="display:inline-block;padding:12px 28px;background:#F0B90B;color:#000;font-size:14px;font-weight:700;border-radius:8px;text-decoration:none">Solicitar novo link</a>
  </div>

  <div class="back"><a href="/">← Voltar ao login</a></div>
</div>

<script>
const token = new URLSearchParams(window.location.search).get('token');
if (!token) { document.getElementById('form-section').style.display='none'; document.getElementById('expired-section').style.display='block'; }

function togglePw(id, btn) { const i=document.getElementById(id); i.type=i.type==='password'?'text':'password'; btn.textContent=i.type==='password'?'👁':'🙈'; }

function checkStr(v) {
  let s=0;
  if(v.length>=6)s++; if(v.length>=10)s++; if(/[A-Z]/.test(v))s++; if(/[0-9]/.test(v))s++; if(/[^A-Za-z0-9]/.test(v))s++;
  const lvl=[{p:'20%',c:'#F85149',t:'Muito fraca'},{p:'40%',c:'#D29922',t:'Fraca'},{p:'60%',c:'#F0B90B',t:'Moderada'},{p:'80%',c:'#3FB950',t:'Forte'},{p:'100%',c:'#3FB950',t:'Muito forte ✅'}];
  const l=lvl[Math.max(0,s-1)];
  const bar=document.getElementById('str-bar'); const lbl=document.getElementById('str-label');
  if(bar){bar.style.width=l.p;bar.style.background=l.c;} if(lbl){lbl.textContent=l.t;lbl.style.color=l.c;}
}

function showMsg(msg, type='error') {
  const el=document.getElementById('msg');
  el.textContent=msg; el.className='alert '+type; el.style.display='block';
}

async function doReset() {
  const np=document.getElementById('new-pass').value;
  const cp=document.getElementById('confirm-pass').value;
  if (!np || np.length<6) return showMsg('Senha deve ter mínimo 6 caracteres');
  if (np !== cp) return showMsg('As senhas não coincidem');
  const btn=document.getElementById('reset-btn'); const txt=document.getElementById('btn-txt');
  btn.disabled=true; txt.textContent='Salvando...';
  try {
    const r=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,newPassword:np})});
    const d=await r.json();
    if (d.ok) {
      document.getElementById('form-section').style.display='none';
      document.getElementById('success-section').style.display='block';
    } else {
      showMsg(d.error||'Erro ao redefinir senha');
      if (d.error?.includes('Token')) {
        document.getElementById('form-section').style.display='none';
        document.getElementById('expired-section').style.display='block';
      }
    }
  } catch(e) { showMsg('Erro de conexão'); }
  finally { btn.disabled=false; txt.textContent='Salvar nova senha'; }
}
</script>
</body>
</html>
