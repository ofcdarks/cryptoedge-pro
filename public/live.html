<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Trading IA 24/7 — CryptoEdge Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0C10;color:#F0F6FC;font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg1:#0D1117;--bg2:#161B22;--bg3:#21262D;--border:#30363D;
  --green:#3FB950;--red:#F85149;--gold:#F0B90B;--blue:#58A6FF;
  --t1:#F0F6FC;--t2:#9BA8B9;--t3:#545D6B;
  --mono:'JetBrains Mono',monospace;
}
.topbar{height:52px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:28px;height:28px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#000}
.logo-text{font-size:14px;font-weight:600;color:var(--t1)}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(248,81,73,0.15);border:1px solid rgba(248,81,73,0.4);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--red)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.85)}}
.pair-info{margin-left:12px;display:flex;align-items:center;gap:10px}
.pair-name{font-family:var(--mono);font-weight:700;font-size:15px}
.pair-price{font-family:var(--mono);font-size:20px;font-weight:700}
.change-badge{font-family:var(--mono);font-size:11px;padding:3px 7px;border-radius:4px}
.up{color:var(--green)}.dn{color:var(--red)}
.up-bg{background:rgba(63,185,80,0.15);color:var(--green)}
.dn-bg{background:rgba(248,81,73,0.15);color:var(--red)}
.offline-msg{margin-left:auto;font-size:12px;color:var(--t3)}

.main{display:grid;grid-template-columns:1fr 360px;gap:12px;padding:12px 20px;height:calc(100vh - 52px)}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:12px 14px}

/* Chart */
#tv-container{flex:1;min-height:0;border-radius:8px;overflow:hidden;background:var(--bg2)}
.left-col{display:flex;flex-direction:column;gap:10px;height:100%;min-height:0}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;text-align:center;padding:10px}
.stat-item label{display:block;font-size:10px;color:var(--t3);margin-bottom:3px}
.stat-val{font-family:var(--mono);font-weight:700;font-size:15px}

/* Right col */
.right-col{display:flex;flex-direction:column;gap:10px;height:100%;min-height:0;overflow:hidden}

/* Position card */
.pos-card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:12px}
.pos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.pos-field label{font-size:10px;color:var(--t3);display:block;margin-bottom:2px}
.pos-field .val{font-family:var(--mono);font-size:13px;font-weight:600}

/* IA narration */
.ia-card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:12px;flex-shrink:0}
.ia-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ia-avatar{width:26px;height:26px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#000;flex-shrink:0}
.ia-text{font-size:12px;color:var(--t2);line-height:1.7;background:var(--bg2);border-radius:6px;padding:10px;min-height:56px;max-height:100px;overflow-y:auto}
.ia-thinking{display:inline-flex;gap:3px;align-items:center}
.ia-thinking span{width:5px;height:5px;background:var(--gold);border-radius:50%;animation:bounce 1.2s infinite}
.ia-thinking span:nth-child(2){animation-delay:.2s}
.ia-thinking span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Feed */
.feed-card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:12px;flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.feed-title{font-size:12px;font-weight:600;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;flex-shrink:0}
#feed-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.feed-item{display:flex;gap-8px;padding:7px 9px;border-radius:6px;background:var(--bg2);font-size:12px;border-left:2px solid var(--border)}
.feed-item.green{border-left-color:var(--green)}
.feed-item.red{border-left-color:var(--red)}
.feed-item.gold{border-left-color:var(--gold)}
.feed-item.gray{border-left-color:var(--t3)}
.feed-label{font-weight:600;margin-bottom:2px}
.feed-detail{color:var(--t3);font-size:11px;font-family:var(--mono)}
.feed-time{color:var(--t3);font-size:10px;margin-top:2px;font-family:var(--mono)}

/* Offline overlay */
#offline-overlay{display:none;position:fixed;inset:0;background:rgba(10,12,16,0.85);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#offline-overlay.show{display:flex}
.offline-box{text-align:center;background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:32px 40px}

/* Footer */
.footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-top:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;justify-content:between;font-size:11px;color:var(--t3)}
.footer-brand{margin-right:auto}

/* Responsive */
@media(max-width:768px){
  .main{grid-template-columns:1fr;height:auto}
  .left-col{height:500px}
  .right-col{height:auto}
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">C</div>
    <div class="logo-text">CryptoEdge Pro</div>
  </div>
  <div class="live-badge"><div class="live-dot"></div><span id="tb-live-txt">AO VIVO</span></div>
  <div class="pair-info">
    <span class="pair-name" id="tb-pair">BTC/USDT</span>
    <span class="pair-price up" id="tb-price">—</span>
    <span class="change-badge up-bg" id="tb-change"></span>
  </div>
  <div class="offline-msg" id="tb-status">Conectando...</div>
  <div style="margin-left:auto;font-size:11px;color:var(--t3)" id="tb-clock"></div>
</div>

<!-- Main -->
<div class="main">
  <!-- Left -->
  <div class="left-col">
    <div id="tv-container" style="flex:1"></div>
    <div class="card" style="padding:0">
      <div class="stats-bar">
        <div class="stat-item"><label>Trades</label><div class="stat-val" id="s-trades">0</div></div>
        <div class="stat-item"><label>Wins</label><div class="stat-val up" id="s-wins">0</div></div>
        <div class="stat-item"><label>Losses</label><div class="stat-val dn" id="s-losses">0</div></div>
        <div class="stat-item"><label>Win Rate</label><div class="stat-val" id="s-wr" style="color:var(--gold)">—</div></div>
        <div class="stat-item"><label>PnL Sessão</label><div class="stat-val" id="s-pnl">$0.00</div></div>
      </div>
    </div>
  </div>

  <!-- Right -->
  <div class="right-col">
    <!-- Position -->
    <div class="pos-card" id="pos-card" style="border-color:var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.05em;text-transform:uppercase">Posição</span>
        <span id="pos-status-badge" style="font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg2);color:var(--t3)">Sem posição</span>
      </div>
      <div class="pos-grid" id="pos-grid" style="display:none">
        <div class="pos-field"><label>Direção</label><div class="val" id="pos-dir">—</div></div>
        <div class="pos-field"><label>Entrada</label><div class="val" id="pos-entry" style="font-size:12px">—</div></div>
        <div class="pos-field"><label>PnL</label><div class="val" id="pos-pnl">—</div></div>
        <div class="pos-field"><label style="color:var(--red)">Stop Loss</label><div class="val" id="pos-sl" style="color:var(--red);font-size:12px">—</div></div>
        <div class="pos-field"><label style="color:var(--green)">Take Profit</label><div class="val" id="pos-tp" style="color:var(--green);font-size:12px">—</div></div>
        <div class="pos-field"><label>Aberta há</label><div class="val" id="pos-age" style="font-size:12px;color:var(--t3)">—</div></div>
      </div>
    </div>

    <!-- IA narration -->
    <div class="ia-card">
      <div class="ia-header">
        <div class="ia-avatar">IA</div>
        <div>
          <div style="font-size:13px;font-weight:600">Análise ao vivo</div>
          <div style="font-size:10px;color:var(--t3)" id="ia-strategy-label">Aguardando...</div>
        </div>
        <div id="ia-status-dot" style="margin-left:auto;width:8px;height:8px;border-radius:50%;background:var(--t3)"></div>
      </div>
      <div class="ia-text" id="ia-text">
        <span style="color:var(--t3)">Aguardando o bot iniciar...</span>
      </div>
    </div>

    <!-- Signal feed -->
    <div class="feed-card">
      <div class="feed-title">Feed de sinais</div>
      <div id="feed-list">
        <div style="text-align:center;color:var(--t3);padding:20px;font-size:12px">Aguardando sinais...</div>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://s3.tradingview.com/tv.js" async></script>
<script>
const API = window.location.origin;
let _state = null;
let _tvWidget = null;
let _tvReady  = false;
let _pollInterval = null;

// Clock
setInterval(() => {
  const el = document.getElementById('tb-clock');
  if (el) el.textContent = new Date().toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo'}) + ' BRT';
}, 1000);

// Init TradingView
function initTV(symbol) {
  const sym = (symbol||'BTCUSDT').replace('USDT','') + 'USDT';
  const container = document.getElementById('tv-container');
  if (!container) return;
  try {
    _tvWidget = new TradingView.widget({
      container_id: 'tv-container',
      symbol:        'BINANCE:' + sym,
      interval:      '15',
      timezone:      'America/Sao_Paulo',
      theme:         'dark',
      style:         '1',
      locale:        'br',
      toolbar_bg:    '#0D1117',
      hide_side_toolbar: false,
      allow_symbol_change: false,
      save_image:    false,
      height:        '100%',
      width:         '100%',
    });
    _tvReady = true;
  } catch(e) {
    container.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#545D6B;font-size:13px">Gráfico indisponível</div>';
  }
}

// Format helpers
const fmtUSD  = (n,d=2) => '$' + (isNaN(parseFloat(n))?'0.00':parseFloat(n).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d}));
const fmtTime = ts => ts ? new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '—';
const elapsed = ts => {
  if (!ts) return '—';
  const s = Math.floor((Date.now()-new Date(ts).getTime())/1000);
  if (s < 60) return s+'s'; if (s < 3600) return Math.floor(s/60)+'m '+( s%60)+'s';
  return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m';
};

// Fetch and render state
async function poll() {
  try {
    const r = await fetch(API + '/api/live/state');
    const d = await r.json();
    if (!d.ok) return;
    _state = d;
    renderState(d);
  } catch(e) {
    document.getElementById('tb-status').textContent = 'Sem conexão';
  }
}

function renderState(d) {
  // Topbar
  const statusEl = document.getElementById('tb-status');
  const liveTxt  = document.getElementById('tb-live-txt');
  if (statusEl) statusEl.textContent = d.enabled ? '🟢 Bot ativo' : '⚪ Bot pausado';
  if (liveTxt)  liveTxt.textContent  = d.enabled ? 'AO VIVO' : 'OFFLINE';

  // Strategy label
  const stratEl = document.getElementById('ia-strategy-label');
  if (stratEl) stratEl.textContent = (d.strategy||'').toUpperCase() + ' | ' + (d.pair||'');

  // Session stats
  const sess = d.session || {};
  const setText = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
  setText('s-trades', sess.trades||0);
  setText('s-wins',   sess.wins||0);
  setText('s-losses', sess.losses||0);
  const wr = sess.trades>0 ? Math.round((sess.wins/sess.trades)*100)+'%' : '—';
  setText('s-wr', wr);
  const pnl = sess.pnl||0;
  const pnlEl = document.getElementById('s-pnl');
  if (pnlEl) { pnlEl.textContent = (pnl>=0?'+':'')+fmtUSD(pnl); pnlEl.style.color = pnl>0?'var(--green)':pnl<0?'var(--red)':''; }

  // Position
  const posGrid   = document.getElementById('pos-grid');
  const posBadge  = document.getElementById('pos-status-badge');
  const posCard   = document.getElementById('pos-card');
  if (d.position) {
    if (posGrid)  posGrid.style.display = 'grid';
    if (posBadge) { posBadge.textContent = d.position.side==='BUY'?'🟢 Long':'🔴 Short'; posBadge.style.background = d.position.side==='BUY'?'rgba(63,185,80,0.15)':'rgba(248,81,73,0.15)'; posBadge.style.color = d.position.side==='BUY'?'var(--green)':'var(--red)'; }
    if (posCard)  posCard.style.borderColor = d.position.side==='BUY'?'rgba(63,185,80,0.4)':'rgba(248,81,73,0.4)';
    setText('pos-dir',   d.position.side==='BUY'?'LONG':'SHORT');
    setText('pos-entry', fmtUSD(d.position.entry));
    setText('pos-sl',    fmtUSD(d.position.sl));
    setText('pos-tp',    fmtUSD(d.position.tp));
    setText('pos-age',   elapsed(d.position.openedAt));
    // PnL (estimated from current price)
    const pnlEl2 = document.getElementById('pos-pnl');
    if (pnlEl2 && _state?.lastPrice) {
      const ep = parseFloat(d.position.entry), cp = parseFloat(_state.lastPrice||ep);
      const pp = d.position.side==='BUY' ? (cp-ep)/ep*100 : (ep-cp)/ep*100;
      pnlEl2.textContent = (pp>=0?'+':'')+pp.toFixed(2)+'%';
      pnlEl2.style.color = pp>=0?'var(--green)':'var(--red)';
    }
  } else {
    if (posGrid)  posGrid.style.display = 'none';
    if (posBadge) { posBadge.textContent = 'Sem posição'; posBadge.style.background = 'var(--bg2)'; posBadge.style.color = 'var(--t3)'; }
    if (posCard)  posCard.style.borderColor = 'var(--border)';
  }

  // IA narration
  const iaEl = document.getElementById('ia-text');
  if (iaEl && d.narration) iaEl.textContent = d.narration;
  const iaDot = document.getElementById('ia-status-dot');
  if (iaDot) iaDot.style.background = d.enabled ? 'var(--green)' : 'var(--t3)';

  // Feed
  renderFeed(d.feed||[]);

  // Init TV if pair changed or not yet loaded
  if (!_tvReady && d.pair) initTV(d.pair);
}

function renderFeed(feed) {
  const el = document.getElementById('feed-list');
  if (!el) return;
  if (!feed.length) { el.innerHTML = '<div style="text-align:center;color:var(--t3);padding:20px;font-size:12px">Aguardando sinais...</div>'; return; }
  el.innerHTML = feed.map(f => `
    <div class="feed-item ${f.color||'gray'}">
      <div class="feed-label">${esc(f.label||'')}</div>
      ${f.detail ? `<div class="feed-detail">${esc(f.detail)}</div>` : ''}
      <div class="feed-time">${fmtTime(f.ts)}</div>
    </div>`).join('');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Price ticker from Binance WS
function connectPriceFeed(symbol) {
  const sym = (symbol||'BTCUSDT').toLowerCase().replace('/','');
  const ws  = new WebSocket(`wss://stream.binance.com:9443/ws/${sym}@ticker`);
  ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      const price  = parseFloat(d.c);
      const change = parseFloat(d.P);
      _state = _state || {};
      _state.lastPrice = price;
      const up = change >= 0;
      const priceEl  = document.getElementById('tb-price');
      const changeEl = document.getElementById('tb-change');
      if (priceEl)  { priceEl.textContent = fmtUSD(price); priceEl.className = 'pair-price ' + (up?'up':'dn'); }
      if (changeEl) { changeEl.textContent = (up?'+':'')+change.toFixed(2)+'%'; changeEl.className = 'change-badge '+(up?'up-bg':'dn-bg'); }
    } catch {}
  };
  ws.onerror = ws.onclose = () => setTimeout(() => connectPriceFeed(symbol), 5000);
}

// Start
window.addEventListener('load', () => {
  initTV('BTCUSDT');
  connectPriceFeed('BTCUSDT');
  poll();
  _pollInterval = setInterval(poll, 5000);
  // Update position age every second
  setInterval(() => {
    if (_state?.position?.openedAt) {
      const el = document.getElementById('pos-age');
      if (el) el.textContent = elapsed(_state.position.openedAt);
    }
  }, 1000);
});
</script>
</body>
</html>
